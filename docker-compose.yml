services:
  ros2:
    build: .
    working_dir: /workspace
    environment:
      DISPLAY: ${DISPLAY:-}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-}
      PULSE_SERVER: ${PULSE_SERVER:-}
    volumes:
      - .:/workspace
    ports:
      - "5005:5005/udp"
      - "5005:5005/tcp"
    stdin_open: true
    tty: true
    command: bash
