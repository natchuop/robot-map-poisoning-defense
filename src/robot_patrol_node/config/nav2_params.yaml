controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
      movement_time_allowance: 20.0

    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.08
      yaw_goal_tolerance: 3.14
      stateful: false

    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 0.18
      lookahead_dist: 0.38
      min_lookahead_dist: 0.24
      max_lookahead_dist: 0.70
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.5
      min_approach_linear_velocity: 0.06
      approach_velocity_scaling_dist: 0.65
      max_allowed_time_to_collision_up_to_carrot: 1.2
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.24
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 2.0
      regulated_linear_scaling_min_radius: 0.45
      regulated_linear_scaling_min_speed: 0.06
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.35
      use_rotate_to_heading: false
      rotate_to_heading_angular_vel: 0.7
      max_angular_accel: 2.0
      use_cancel_deceleration: true
      cancel_deceleration: 4.0
      rotate_to_heading_min_angle: 0.65
      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: false
      use_collision_detection: false
      transform_tolerance: 0.3
      stateful: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 8.0
      publish_frequency: 3.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.18
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.20
        cost_scaling_factor: 2.6

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      robot_radius: 0.18
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.22
        cost_scaling_factor: 2.5

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.25
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.3
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: nav2_behaviors::Spin
    backup:
      plugin: nav2_behaviors::BackUp
    wait:
      plugin: nav2_behaviors::Wait

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
