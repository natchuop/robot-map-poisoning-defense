services:
  ros2:
    environment:
      DISPLAY: ${RMPD_XQUARTZ_DISPLAY:-host.docker.internal:0}
      QT_X11_NO_MITSHM: "1"
      QT_QPA_PLATFORM: ${RMPD_QT_QPA_PLATFORM:-xcb}
      QT_OPENGL: ${RMPD_QT_OPENGL:-software}
      LIBGL_ALWAYS_INDIRECT: ${RMPD_LIBGL_ALWAYS_INDIRECT:-1}
      LIBGL_ALWAYS_SOFTWARE: ${RMPD_LIBGL_ALWAYS_SOFTWARE:-1}
      MESA_GL_VERSION_OVERRIDE: ${RMPD_MESA_GL_VERSION_OVERRIDE:-2.1}
      MESA_LOADER_DRIVER_OVERRIDE: ${RMPD_MESA_LOADER_DRIVER_OVERRIDE:-llvmpipe}
