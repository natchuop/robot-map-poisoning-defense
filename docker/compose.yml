services:
  ros2:
    image: ${RMPD_IMAGE:-robot-map-poisoning-defense:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        RMPD_INSTALL_FULL_STACK: ${RMPD_INSTALL_FULL_STACK:-true}
    working_dir: ${RMPD_CONTAINER_WORKSPACE:-/workspace}
    environment:
      DISPLAY: ${DISPLAY:-}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-}
      PULSE_SERVER: ${PULSE_SERVER:-}
      RMPD_CONTAINER_WORKSPACE: ${RMPD_CONTAINER_WORKSPACE:-/workspace}
    volumes:
      - ..:${RMPD_CONTAINER_WORKSPACE:-/workspace}
    ports:
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT:-5005}:5005/udp"
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT:-5005}:5005/tcp"
      - "8765:8765"
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT_SECONDARY:-5006}:5006/udp"
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT_SECONDARY:-5006}:5006/tcp"
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT_THIRD:-5007}:5007/udp"
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT_THIRD:-5007}:5007/tcp"
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT_FOURTH:-5008}:5008/udp"
      - "${RMPD_BRIDGE_BIND:-127.0.0.1}:${RMPD_BRIDGE_PORT_FOURTH:-5008}:5008/tcp"
    stdin_open: true
    tty: true
    command: bash
